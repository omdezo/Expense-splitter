# Base stack — shared by dev and production.
#
# This file alone is NOT run directly. Compose composes it with an overlay:
#
#   dev   docker compose up                      (docker-compose.override.yml is auto-applied)
#   prod  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Everything environment-specific — published ports, credentials, Keycloak's
# run mode — lives in the overlays. Defaults here are dev-friendly so `up` works
# with zero configuration; docker-compose.prod.yml replaces every one of them
# with a REQUIRED variable, so production can never silently boot on a default
# password.
name: expense-splitter

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-expense_splitter}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak's own database — kept separate from the application DB on purpose.
  # An identity provider should never share storage with the app it protects.
  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    # Custom image = stock Keycloak + our theme baked in (see keycloak/Dockerfile).
    build:
      context: ./keycloak
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      # Bootstrap admin for the Keycloak admin console.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # Persist Keycloak state in its own Postgres.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    volumes:
      # The realm definition — clients, roles, settings. Deliberately contains NO
      # users and NO credentials, so it is safe to import in production. Dev users
      # are mounted separately by docker-compose.override.yml.
      # Named <realm>-realm.json for Keycloak's split-file import format.
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/expense-splitter-realm.json:ro

  # Object storage for proof images (the DB keeps only metadata + sha256).
  minio:
    # Pinned — `latest` would make a redeploy pull an untested image.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-expense_splitter}
      # Keys are fetched over the internal docker network (always reachable),
      # while the issuer we trust is the address tokens are actually minted from.
      # Validating these two independently avoids Keycloak's host/container
      # issuer-mismatch problem. Both issuers are accepted so tokens minted from
      # inside the network also pass. In production KEYCLOAK_PUBLIC_URL is the
      # browser-facing Keycloak address (https://auth.example.com).
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/expense-splitter/protocol/openid-connect/certs
      KEYCLOAK_ISSUERS: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}/realms/expense-splitter,http://keycloak:8080/realms/expense-splitter
      KEYCLOAK_AUDIENCE: expense-splitter-api
      # Server-side calls into Keycloak: /auth/login (password grant on the public
      # client) and /auth/register (create user via the admin API).
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: expense-splitter
      KEYCLOAK_CLIENT_ID: expense-splitter-api
      KEYCLOAK_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # Proof-image object storage (MinIO, S3-compatible).
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: proofs
      STORAGE_USE_SSL: "false"
      GLOBAL_ADMIN_EMAIL: ${GLOBAL_ADMIN_EMAIL:-admin@expense-splitter.local}

volumes:
  pgdata:
  keycloak_pgdata:
  minio_data:
