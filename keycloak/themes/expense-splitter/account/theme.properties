# Expense Splitter — account console theme.
#
# The KС26 Account Console is a React app whose base theme is `keycloak.v3`
# (NOT keycloak.v2 — that is the LOGIN theme). The base theme's index.ftl injects
# the runtime config the React app needs, so the parent MUST be keycloak.v3 or
# the console fails to authenticate (HTTP 401). We inherit it wholesale for now;
# the React console is customized differently from FTL login themes.
parent=keycloak.v3

locales=en,ar
