# Expense Splitter — login theme.
#
# parent=keycloak.v2 inherits the modern (PatternFly 5) login pages, so we only
# override what we need (a custom login form + our own stylesheet) and everything
# else (page shell, scripts, error pages, OTP, reset-password, etc.) keeps
# working across Keycloak upgrades.
parent=keycloak.v2
import=common/keycloak

# styles REPLACES the parent list, so we re-list the base stylesheet (css/styles.css
# resolves up the parent chain to keycloak.v2) and append our own custom.css.
# The PatternFly vendor CSS comes in via `import=common/keycloak` above.
styles=css/styles.css css/custom.css

# Languages offered by the login page (realm i18n must also be enabled — it is,
# in realm-export.json). Adds the language switcher.
locales=en,ar
