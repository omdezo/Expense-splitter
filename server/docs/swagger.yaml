        type: integer
      category:
        $ref: '#/definitions/types.ExpenseCategory'
      created_at:
        type: string
      description:
        type: string
      group_id:
        type: string
      id:
        type: string
      occurred_on:
        type: string
      paid_by:
        type: string
      shares:
        items:
