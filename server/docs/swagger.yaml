      id:
        type: string
      invite_token:
        type: string
      name:
        type: string
      start_date:
        type: string
      status:
        $ref: '#/definitions/types.GroupStatus'
      status_token:
        type: string
    type: object
  types.GroupDetail:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      end_date:
        type: string
      expected_member_count:
        type: integer
      id:
        type: string
      invite_token:
        type: string
      members:
        items:
          $ref: '#/definitions/types.MembershipView'
        type: array
      name:
        type: string
      start_date:
        type: string
      status:
        $ref: '#/definitions/types.GroupStatus'
      status_token:
        type: string
    type: object
  types.GroupListItem:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      end_date:
        type: string
      expected_member_count:
        type: integer
      id:
        type: string
      invite_token:
        type: string
      membership_status:
        $ref: '#/definitions/types.MembershipStatus'
      name:
        type: string
      role:
        $ref: '#/definitions/types.MembershipRole'
      start_date:
        type: string
      status:
        $ref: '#/definitions/types.GroupStatus'
      status_token:
        type: string
    type: object
  types.GroupStatus:
    enum:
    - open
    - closed
    - settled
    type: string
    x-enum-varnames:
    - GroupOpen
    - GroupClosed
    - GroupSettled
  types.GroupSummary:
    properties:
      end_date:
        type: string
      group_id:
        type: string
      member_count:
        type: integer
      members:
        items:
          $ref: '#/definitions/types.MemberSummary'
        type: array
      name:
        type: string
      spend_per_category:
        additionalProperties:
          format: int64
          type: integer
        type: object
      start_date:
        type: string
      status:
        $ref: '#/definitions/types.GroupStatus'
      total_spent:
        type: integer
    type: object
  types.JoinGroupRequest:
    properties:
      invite_token:
        type: string
    type: object
  types.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  types.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  types.MemberBalance:
    properties:
      fair_share:
        type: integer
      net:
        type: integer
      paid:
        type: integer
      user_id:
        type: string
    type: object
  types.MemberSummary:
    properties:
      email:
        type: string
      fair_share:
        type: integer
      net:
        type: integer
      paid:
        type: integer
      user_id:
        type: string
    type: object
  types.MembershipRole:
    enum:
    - group_admin
    - member
    type: string
    x-enum-varnames:
    - RoleGroupAdmin
    - RoleMember
  types.MembershipStatus:
    enum:
    - requested
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - MembershipRequested
    - MembershipApproved
    - MembershipRejected
  types.MembershipView:
    properties:
      created_at:
        type: string
      email:
        type: string
      group_id:
        type: string
      role:
        $ref: '#/definitions/types.MembershipRole'
      status:
        $ref: '#/definitions/types.MembershipStatus'
      user_id:
        type: string
    type: object
  types.Nudge:
    properties:
      amount_baisa:
        type: integer
      payment_id:
        type: string
      recipient_user_id:
        type: string
      type:
        $ref: '#/definitions/types.NudgeType'
    type: object
  types.NudgeRunResult:
    properties:
      group_id:
        type: string
      sent:
        items:
          $ref: '#/definitions/types.Nudge'
        type: array
      skipped:
        type: integer
      threshold_hours:
        type: integer
    type: object
  types.NudgeType:
    enum:
    - debtor
    - creditor
    type: string
    x-enum-varnames:
    - NudgeDebtor
    - NudgeCreditor
  types.Page:
    properties:
      items: {}
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  types.PaymentStatus:
    enum:
    - pending
    - proof_submitted
    - creditor_confirmed
    - disputed
    - settled
    type: string
    x-enum-varnames:
    - PaymentPending
    - PaymentProofSubmitted
    - PaymentCreditorConfirmed
    - PaymentDisputed
    - PaymentSettled
  types.PaymentView:
    properties:
      amount_baisa:
        type: integer
      created_at:
        type: string
      from:
        type: string
      id:
        type: string
      status:
        $ref: '#/definitions/types.PaymentStatus'
      to:
        type: string
    type: object
  types.Principal:
    properties:
      email:
        type: string
      id:
        type: string
      is_global_admin:
        type: boolean
      verification_status:
        $ref: '#/definitions/types.VerificationStatus'
    type: object
  types.ProofType:
    enum:
    - image
    - text
    type: string
    x-enum-varnames:
    - ProofImage
    - ProofText
  types.ProofView:
    properties:
      byte_size:
        type: integer
      created_at:
        type: string
      note:
        type: string
      payment_id:
        type: string
      proof_type:
        $ref: '#/definitions/types.ProofType'
      sha256:
        type: string
    type: object
  types.PublicGroupStatus:
    properties:
      member_count:
        type: integer
      name:
        type: string
      status:
        $ref: '#/definitions/types.GroupStatus'
      total_spent:
        type: integer
    type: object
  types.RecordExpenseRequest:
    properties:
      amount_baisa:
        type: integer
      category:
        $ref: '#/definitions/types.ExpenseCategory'
      description:
        type: string
      occurred_on:
        type: string
      shares:
        description: |-
          Shares is optional: absent/empty means an equal split across all
          approved members at settlement. Weight defaults to 1 when omitted.
        items:
          $ref: '#/definitions/types.ShareInput'
        type: array
    type: object
  types.RefreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  types.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  types.SettlementPlanResponse:
    properties:
      group_id:
        type: string
      group_status:
        $ref: '#/definitions/types.GroupStatus'
      note:
        description: Note explains an empty plan (e.g. every net balance was already
          zero).
        type: string
      payments:
        items:
          $ref: '#/definitions/types.PaymentView'
        type: array
      settled_count:
        type: integer
      snapshot:
        allOf:
        - $ref: '#/definitions/types.SettlementSnapshot'
        description: |-
          Snapshot is the state settlement was computed over: total spent, member
          count, and each member's paid / fair share / net.
      total_count:
        type: integer
    type: object
  types.SettlementSnapshot:
    properties:
      member_count:
        type: integer
      members:
        items:
          $ref: '#/definitions/types.MemberBalance'
        type: array
      spend_per_category:
        additionalProperties:
          format: int64
          type: integer
        type: object
      total_spent:
        type: integer
    type: object
  types.ShareInput:
    properties:
      user_id:
        type: string
      weight:
        type: integer
    type: object
  types.SplitType:
    enum:
    - equal
    - subset
    - weighted
    type: string
    x-enum-varnames:
    - SplitEqual
    - SplitSubset
    - SplitWeighted
  types.SubmitProofRequest:
    properties:
      note:
        type: string
    type: object
  types.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/types.Principal'
    type: object
  types.Transfer:
    properties:
      amount:
        type: integer
      from:
        type: string
      to:
        type: string
    type: object
  types.UpdateExpenseRequest:
    properties:
      amount_baisa:
        type: integer
      category:
        $ref: '#/definitions/types.ExpenseCategory'
      description:
        type: string
      occurred_on:
        type: string
      shares:
        description: |-
          Shares is optional: absent/empty means an equal split across all
          approved members at settlement. Weight defaults to 1 when omitted.
        items:
          $ref: '#/definitions/types.ShareInput'
        type: array
    type: object
  types.UpdateGroupRequest:
    properties:
      end_date:
        type: string
      expected_member_count:
        type: integer
      name:
        type: string
      start_date:
        type: string
    type: object
  types.UserMembershipView:
    properties:
      created_at:
        type: string
      group_id:
        type: string
      group_name:
        type: string
      role:
        $ref: '#/definitions/types.MembershipRole'
      status:
        $ref: '#/definitions/types.MembershipStatus'
    type: object
  types.VerificationStatus:
    enum:
    - registered
    - pending_verification
    - verified
    - rejected
    type: string
    x-enum-varnames:
    - VerificationRegistered
    - VerificationPending
    - VerificationVerified
    - VerificationRejected
  types.apiError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    Shared-expense settlement tracker for group trips. Members record what they paid; closing a group computes each member's fair share and the minimum set of payments that squares everyone up. Money moves off-platform — each computed payment is tracked through a two-key confirmation flow (debtor proves, creditor attests, admin finalizes).

    All amounts are integer **baisa** (1.000 OMR = 1000). There are no floats in the money path.

    **Authenticating here:** call `POST /auth/login` (try `admin@expense-splitter.local` / `admin`), copy the `access_token` from the response, click **Authorize** above and paste `Bearer <access_token>`.
  title: Expense Splitter API
  version: "1.0"
paths:
  /admin/groups:
    get:
      description: Global admin only. Every group in the system, regardless of membership.
        Returns a `{total, limit, offset, items}` envelope.
      parameters:
      - default: 50
        description: page size (1-200)
        in: query
        name: limit
        type: integer
      - default: 0
        description: rows to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: paginated groups
          schema:
            $ref: '#/definitions/types.Page'
        "400":
          description: invalid paging
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: global admin only
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: List all groups
      tags:
      - admin
  /admin/groups/{id}:
    delete:
      description: Global admin only, and **pristine groups only** — a group with
        any recorded expense or computed payment cannot be deleted.
      parameters:
      - description: group id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: group deleted
        "400":
          description: invalid group id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: global admin only
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: group not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: group is not pristine
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Delete a group
      tags:
      - admin
  /admin/users:
    get:
      description: Global admin only. Filter by verification status to work the approval
        queue. Returns a `{total, limit, offset, items}` envelope.
      parameters:
      - description: filter by verification status
        enum:
        - registered
        - pending_verification
        - verified
        - rejected
        in: query
        name: status
        type: string
      - default: 50
        description: page size (1-200)
        in: query
        name: limit
        type: integer
      - default: 0
        description: rows to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: paginated users
          schema:
            $ref: '#/definitions/types.Page'
        "400":
          description: invalid status or paging
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: global admin only
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - admin
  /admin/users/{id}:
    delete:
      description: Global admin only. Refused when the user has recorded expenses
        or is party to a payment — removing them would corrupt a split.
      parameters:
      - description: user id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: user deleted
        "400":
          description: invalid user id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: global admin only
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: user has expenses or payments
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - admin
    get:
      description: Global admin only. The account plus its group memberships and roles.
      parameters:
      - description: user id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: the user and their memberships
          schema:
            $ref: '#/definitions/types.AdminUserDetail'
        "400":
          description: invalid user id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: global admin only
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Get one user's full detail
      tags:
      - admin
  /admin/users/{id}/approve:
    post:
      description: Global admin only. Marks the target account `verified`, unlocking
        group participation.
      parameters:
      - description: user id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: the verified account
          schema:
            $ref: '#/definitions/types.Principal'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: global admin only
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Approve a user's verification
      tags:
      - admin
  /admin/users/{id}/reject:
    post:
      description: Global admin only. Marks the target account `rejected` — it stays
        blocked from joining groups or recording expenses.
      parameters:
      - description: user id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: the rejected account
          schema:
            $ref: '#/definitions/types.Principal'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: global admin only
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Reject a user's verification
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Exchanges email + password for an access token (~5 min) and a refresh
        token. Also returns your local `user` row, which is auto-provisioned/linked
        on first login. Copy the `access_token` into the **Authorize** button to use
        the rest of this page.
      parameters:
      - description: email + password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: access_token, refresh_token, user
          schema:
            $ref: '#/definitions/types.TokenResponse'
        "400":
          description: invalid body
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: bad credentials
          schema:
            $ref: '#/definitions/types.apiError'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the session behind the given refresh token. Idempotent
        — logging out an already-revoked session still succeeds.
      parameters:
      - description: refresh_token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.LogoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: session revoked
        "400":
          description: invalid body
          schema:
            $ref: '#/definitions/types.apiError'
      summary: Log out
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Renews the access/refresh token pair without re-sending the password.
        Fails once the session has been revoked by logout.
      parameters:
      - description: refresh_token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: a fresh token pair
          schema:
            $ref: '#/definitions/types.TokenResponse'
        "400":
          description: invalid body
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: refresh token is invalid or expired
          schema:
            $ref: '#/definitions/types.apiError'
      summary: Refresh a session
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates the Keycloak identity and the linked local user row. The
        new account starts at verification_status `registered` — it must be verified
        before it can join groups or record expenses.
      parameters:
      - description: email, password, name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: the created account
          schema:
            $ref: '#/definitions/types.Principal'
        "400":
          description: invalid body / weak password
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: email already registered
          schema:
            $ref: '#/definitions/types.apiError'
      summary: Sign up a new user
      tags:
      - auth
  /groups:
    get:
      description: Every group where the caller has an approved membership, with their
        role in each.
      produces:
      - application/json
      responses:
        "200":
          description: your groups
          schema:
            items:
              $ref: '#/definitions/types.GroupListItem'
            type: array
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: List the groups you belong to
      tags:
      - groups
    post:
      consumes:
      - application/json
      description: |-
        Any verified user can create a group and becomes its group-admin. The global admin may instead create one *on behalf of others* by setting `group_admin_id` — they then assign that member as group-admin and are not part of the trip or the split.

        `expected_member_count` is a planning hint only and has **zero** effect on any calculation — fair shares always divide by the count of actual members at settlement.
      parameters:
      - description: name, trip dates, optional group_admin_id
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: the created group, including its invite token
          schema:
            $ref: '#/definitions/types.Group'
        "400":
          description: invalid body / bad date range
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: caller is not verified
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Create a trip group
      tags:
      - groups
  /groups/{id}:
    get:
      description: Members and admins only. Returns trip metadata plus the member
