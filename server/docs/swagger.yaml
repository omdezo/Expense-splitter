      tags:
      - ops
  /groups/{id}/close:
    post:
      description: |-
        Group-admin only. **This is the pivotal action:** it freezes expenses, computes each member's fair share, and generates the payment plan — the minimum set of transfers that zeroes every balance.

        Runs exactly once, under a row lock, over a consistent snapshot: a concurrent second close gets 409, and expenses in flight during the close are blocked and then rejected.
      parameters:
      - description: group id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: the computed plan
          schema:
            $ref: '#/definitions/types.CloseResult'
        "400":
          description: invalid group id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not this group's admin
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: group not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: group is already closed
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Close the group and compute settlement
      tags:
      - groups
  /groups/{id}/expenses:
    get:
      description: |-
        Members and admins only. Filter by category or payer, and search descriptions with `q`. Returns a `{total, limit, offset, items}` envelope where `items` is an array of expenses.

        Descriptions are truncated to 80 characters, cut on a word boundary so the last word stays whole (e.g. `"dinner at the ..."`).
      parameters:
      - description: group id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: filter by category
        enum:
        - lodging
        - fuel
        - food
        - transport
        - other
        in: query
        name: category
        type: string
      - description: filter by payer's user id
        format: uuid
        in: query
        name: paid_by
        type: string
      - description: search in description
        in: query
        name: q
        type: string
      - default: 50
        description: page size (1-200)
        in: query
        name: limit
        type: integer
      - default: 0
        description: rows to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: paginated expenses
          schema:
            $ref: '#/definitions/types.Page'
        "400":
          description: invalid id, filter, or paging
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not a member of this group
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: group not found
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: List a group's expenses
      tags:
      - expenses
    post:
      consumes:
      - application/json
      description: |-
        Approved members only, while the group is **open**. `paid_by` must equal the caller — you can only record what *you* paid.

        `amount` is integer **baisa** (1.000 OMR = 1000) and must be positive. `occurred_on` must fall inside the trip's date range. `category` is one of: lodging, fuel, food, transport, other.
      parameters:
      - description: group id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: amount (baisa), category, description, occurred_on, paid_by
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.RecordExpenseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: the recorded expense
          schema:
            $ref: '#/definitions/types.Expense'
        "400":
          description: bad amount/date/category, or paid_by is not the caller
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not an approved member
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: group not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: group is closed
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Record an expense you paid
      tags:
      - expenses
