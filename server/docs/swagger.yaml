  /groups/{id}/audit:
    get:
      description: 'Admins only. The full history: expense edits with **before/after**
        amounts, role transfers, membership decisions, and every payment-state transition.
        Returns a `{total, limit, offset, items}` envelope.'
      parameters:
      - description: group id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - default: 50
        description: page size (1-200)
        in: query
        name: limit
        type: integer
      - default: 0
        description: rows to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: paginated audit entries
          schema:
            $ref: '#/definitions/types.Page'
        "400":
          description: invalid id or paging
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not an admin of this group
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: group not found
          schema:
            $ref: '#/definitions/types.apiError'
