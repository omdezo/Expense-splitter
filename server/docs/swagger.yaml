basePath: /
definitions:
  services.MeResponse:
    properties:
      email:
        type: string
      email_verified:
        type: boolean
      local_user:
        $ref: '#/definitions/types.Principal'
      name:
        type: string
      preferred_username:
        type: string
      subject:
        type: string
    type: object
  types.AdminUserDetail:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_global_admin:
        type: boolean
      linked:
        type: boolean
      memberships:
        items:
          $ref: '#/definitions/types.UserMembershipView'
        type: array
      verification_status:
        $ref: '#/definitions/types.VerificationStatus'
    type: object
  types.CloseResult:
    properties:
      group_id:
