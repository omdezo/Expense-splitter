      tags:
      - payments
  /payments/{id}/dispute:
    post:
      description: The creditor says the money never arrived, moving the payment to
        `disputed`. A disputed payment can **never** be reported settled — the debtor
        must re-submit proof and both keys must run again.
      parameters:
      - description: payment id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: payment now disputed
          schema:
            $ref: '#/definitions/types.PaymentView'
        "400":
          description: invalid payment id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: you are not this payment's creditor
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: payment not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: payment is not in a disputable state
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Deny receiving the money (creditor)
      tags:
      - payments
  /payments/{id}/finalize:
    post:
      description: |-
        The group-admin (own group) or global admin (any group) marks a `creditor_confirmed` payment as **settled** — the only transition that produces `settled`, and it is terminal.

        A debtor can never settle their own payment, **even if they are also the group-admin**. The global admin's override may finalize any non-settled payment and can do nothing else.
      parameters:
      - description: payment id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: payment now settled
          schema:
            $ref: '#/definitions/types.PaymentView'
        "400":
          description: invalid payment id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not an admin for this payment's group, or you are the debtor
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: payment not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: payment has not been confirmed by the creditor
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Finalize a payment as settled (admin)
      tags:
      - payments
  /payments/{id}/proof:
    get:
      description: Visible to the debtor, the creditor, and admins. Returns the note
        and/or the image's metadata — content type, size, and sha256. Use `/proof/image`
        for the bytes.
      parameters:
      - description: payment id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: proof note and/or image metadata
          schema:
            $ref: '#/definitions/types.ProofView'
        "400":
          description: invalid payment id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not a party to this payment
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: payment or proof not found
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Get a payment's proof metadata
      tags:
      - payments
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: |-
        **Key 1 of 2.** The debtor evidences that they paid their creditor in real life, moving the payment to `proof_submitted`. Also the way out of `disputed` — re-submit and both keys run again.

        Accepts either shape:
        - **JSON** `{"note": "paid 40 cash on day 3"}`
        - **multipart/form-data** with an `image` file field (receipt or transfer screenshot)

        Images are capped at 5 MiB and validated by **magic bytes** (jpeg/png/gif/webp) — never by file extension. The stored sha256 makes a later swap detectable.
      parameters:
      - description: payment id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: text note (JSON variant)
        in: body
        name: body
        schema:
          $ref: '#/definitions/types.SubmitProofRequest'
      - description: receipt image, max 5 MiB (multipart variant)
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: payment now proof_submitted
          schema:
            $ref: '#/definitions/types.PaymentView'
        "400":
          description: invalid id/body, oversized file, or not a real image
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: you are not this payment's debtor
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: payment not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: payment is not in a state that accepts proof
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Upload proof of payment (debtor)
      tags:
      - payments
  /payments/{id}/proof/image:
    get:
      description: Visible to the debtor, the creditor, and admins. Streams the stored
        image from object storage with its real content type.
      parameters:
      - description: payment id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/jpeg
      - image/png
      responses:
        "200":
          description: the proof image
          schema:
            type: file
        "400":
          description: invalid payment id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not a party to this payment
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: no image proof on this payment
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Download the proof image bytes
      tags:
      - payments
  /payments/{id}/reject:
    post:
      description: The group-admin (own group) or global admin (any group) sends a
        payment to `disputed`, returning it to the debtor to re-submit proof. `settled`
        stays terminal — even for the global admin.
      parameters:
      - description: payment id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: payment now disputed
          schema:
            $ref: '#/definitions/types.PaymentView'
        "400":
          description: invalid payment id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: not an admin for this payment's group
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: payment not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: payment is already settled
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Reject a payment back to disputed (admin)
      tags:
      - payments
  /public/groups/{token}:
    get:
      description: '**The only unauthenticated group view** — no bearer token required.
        Given a group''s shareable token, returns a deliberately minimal status (no
        amounts, no member financials) so a link can be shared safely.'
      parameters:
      - description: group share token
        format: uuid
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: minimal public status
          schema:
            $ref: '#/definitions/types.PublicGroupStatus'
        "400":
          description: invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: no group for this token
          schema:
            $ref: '#/definitions/types.apiError'
      summary: Check a group's status by share token
      tags:
      - public
  /register:
    post:
      description: Idempotent. Creates the local row for the bearer token's subject,
        or links/returns the existing one. Login does this automatically — this endpoint
        exists for tokens minted outside the login flow.
      produces:
      - application/json
      responses:
        "201":
          description: the linked local account
          schema:
            $ref: '#/definitions/types.Principal'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: email already registered to another subject
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Link the caller's token to a local user row
      tags:
      - account
  /verification:
    post:
      description: Moves your account `registered` -> `pending_verification`, putting
        it in the global admin's queue. You must reach `verified` before you can join
        a group, record expenses, or be settled against.
      produces:
      - application/json
      responses:
        "200":
          description: account now pending_verification
          schema:
            $ref: '#/definitions/types.Principal'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: caller is not provisioned
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: account is not in a submittable state
          schema:
            $ref: '#/definitions/types.apiError'
      security:
      - BearerAuth: []
      summary: Submit your account for verification
      tags:
      - account
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Bearer token from POST /auth/login. Format: `Bearer <access_token>`'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Public session endpoints — login, refresh, logout, sign-up. No bearer
    token required.
  name: auth
- description: 'The caller''s own account: identity, local-row linking, verification
    submission.'
  name: account
- description: Trip groups — create, read, update, close (close computes the settlement).
  name: groups
- description: Join requests, approval/rejection, admin handoff, member removal.
  name: membership
- description: Recording and listing what each member paid, while the group is open.
  name: expenses
- description: Fair-share summary, the computed payment plan, and the report PDF.
  name: settlement
- description: 'The two-key confirmation flow: proof upload, creditor confirm/dispute,
    admin finalize/reject.'
  name: payments
- description: Global-admin only — user verification and system-wide user/group management.
  name: admin
- description: Audit trail and reminder nudges.
  name: ops
- description: Unauthenticated endpoints — health and share-token group status.
  name: public
