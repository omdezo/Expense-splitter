  /payments/{id}/confirm:
    post:
      description: '**Key 2 of 2.** The creditor — the person owed — confirms the
        money actually arrived, moving `proof_submitted` -> `creditor_confirmed`.
        This is the *only* transition that produces `creditor_confirmed`, and only
        the creditor may call it.'
      parameters:
      - description: payment id
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: payment now creditor_confirmed
          schema:
            $ref: '#/definitions/types.PaymentView'
        "400":
          description: invalid payment id
          schema:
            $ref: '#/definitions/types.apiError'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/types.apiError'
        "403":
          description: you are not this payment's creditor
          schema:
            $ref: '#/definitions/types.apiError'
        "404":
          description: payment not found
          schema:
            $ref: '#/definitions/types.apiError'
        "409":
          description: payment is not awaiting your confirmation
